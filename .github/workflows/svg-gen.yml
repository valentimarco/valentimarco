name: Update README cards

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dracula
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&theme=dracula
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SoundMixerPlugin pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=SoundMixerPlugin&theme=dracula
          path: profile/SoundMixerPlugin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Progetto-Compilatori pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Progetto-Compilatori-2023&theme=dracula
          path: profile/Progetto-Compilatori-2023.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Progetto-Lab.-Algoritmi-2023 pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Progetto-Lab.-Algoritmi-2023&theme=dracula
          path: profile/Progetto-Lab.-Algoritmi-2023.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate Progetto-Data-Science-2023 pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Progetto-Data-Science-2023&theme=dracula
          path: profile/Progetto-Data-Science-2023.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate Progetto-Open-Data-2023 pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Progetto-Open-Data-2023&theme=dracula
          path: profile/Progetto-Open-Data-2023.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push

